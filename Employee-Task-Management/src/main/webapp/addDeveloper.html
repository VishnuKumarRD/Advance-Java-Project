<!DOCTYPE html>

<body>
<form action="addDeveloper">
<h2>-DEVELOPER REGISTER-</h2>
<br>
<hr>

<label for="name">ENTER DEVELOPER NAME : </label>
<input type="text" placeholder="enter your name" id="name" name="developer-name"><br><br>

<input type="text" placeholder="enter your email" id="mail" name="developer-email"><br><br>
<label for="password">ENTER DEVELOPER PASSWORD : </label>

<label for="salary">ENTER DEVELOPER SALARY: </label>

</form>
