<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<form action="register">
<h2>-Register for Manager-</h2>
<br>
<hr>
<br>
<label id="id">ENTER EMPLOYEE ID : </label>
<input type="text" placeholder="enter your employee id" for="id" name="manager-id"><br><br>
<label id="name">ENTER EMPLOYEE NAME : </label>
<input type="text" placeholder="enter your employee name" for="name" name="manager-name"><br><br>
<label id="mail">ENTER EMPLOYEE EMAIL : </label>
<input type="text" placeholder="enter your employee mail" for="mail" name="manager-email"><br><br>
<label id="password">ENTER EMPLOYEE PASSWORD : </label>
<input type="text" placeholder="enter your employee password" for="password" name="manager-password"><br><br>
<label id="phno">ENTER EMPLOYEE PHONE NUMBER : </label>
<input type="text" placeholder="enter your employee Phno" for="phno" name="manager-phonenumber"><br><br>
<label id="salary">ENTER EMPLOYEE SALARY: </label>
<input type="text" placeholder="enter your employee salary" for="salary" name="manager-salary"><br><br>

<input type="submit" value="REGISTER">
</form>
</body>
</html>
